services:
  mysql:
    image: public.ecr.aws/docker/library/mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set-in-deploy-env}
      MYSQL_DATABASE: word_image_memo
      MYSQL_USER: word_image_memo_app
      MYSQL_PASSWORD: ${MYSQL_APP_PASSWORD:?set-in-deploy-env}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "127.0.0.1",
          "-uword_image_memo_app",
          "-p${MYSQL_APP_PASSWORD}"
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - ./backend.env
    environment:
      DATABASE_URL: mysql://word_image_memo_app:${MYSQL_APP_PASSWORD:?set-in-deploy-env}@mysql:3306/word_image_memo
    volumes:
      - uploads_data:/app/uploads

  nginx:
    image: public.ecr.aws/docker/library/nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../../index.html:/usr/share/nginx/html/index.html:ro
      - ../../app.js:/usr/share/nginx/html/app.js:ro
      - ../../styles.css:/usr/share/nginx/html/styles.css:ro
      - ../../assets:/usr/share/nginx/html/assets:ro

volumes:
  mysql_data:
  uploads_data:
