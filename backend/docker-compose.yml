services:
  mysql:
    image: mysql:8.4
    container_name: tuge-danci-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 8150
      MYSQL_DATABASE: word_image_memo
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p8150"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

volumes:
  mysql_data:
